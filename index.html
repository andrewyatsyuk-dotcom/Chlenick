<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎮 DOOM — ПІДВАЛ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#ccc;font-family:'Segoe UI',system-ui,sans-serif}
    #loader{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:12px}
    #loader h1{font-size:2rem;color:#ff3e3e;text-shadow:0 0 20px #ff3e3e;letter-spacing:4px}
    #loader p{font-size:0.85rem;opacity:0.6;text-align:center;padding:0 20px}
    #loader .bar{width:200px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
    #loader .bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#ff3e3e,#ff6600);border-radius:2px;animation:load 3s ease-in-out forwards}
    @keyframes load{0%{width:0%}50%{width:70%}100%{width:100%}}
    #loader.h{display:none}
    #doom-frame{width:100%;height:100%;border:none;display:block}
    .ctrl-overlay{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:8px;z-index:5;pointer-events:none}
    .ctrl-btn{pointer-events:auto;width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:white;font-size:1.4rem;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none}
    .ctrl-btn:active{background:rgba(255,62,62,0.3);border-color:rgba(255,62,62,0.5)}
    .ctrl-row{display:flex;gap:6px;align-items:center}
    .ctrl-section{display:flex;flex-direction:column;gap:4px;align-items:center}
  </style>
</head>
<body>
  <div id="loader">
    <h1>DOOM</h1>
    <p>Завантаження...</p>
    <div class="bar"><div class="bar-fill"></div></div>
    <p style="font-size:0.65rem;opacity:0.3;margin-top:20px">Powered by js-dos | id Software</p>
  </div>

  <iframe id="doom-frame" src="https://dos.zone/player/?bundleUrl=https%3A%2F%2Fcdn.dos.zone%2Foriginal%2F2X%2F2%2F2151f0480e0e861b083a9b8b2a8a6d4b8c901233.jsdos&anonymous=1" allow="autoplay; fullscreen; gamepad" allowfullscreen></iframe>

  <script>
  (function(){
    try {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) { tg.ready(); tg.expand(); }
    } catch(e) {}

    var frame = document.getElementById('doom-frame');
    var loader = document.getElementById('loader');

    frame.onload = function() {
      setTimeout(function() {
        loader.classList.add('h');
        frame.focus();
      }, 1500);
    };

    setTimeout(function() {
      loader.classList.add('h');
    }, 8000);

    document.addEventListener('click', function() {
      frame.focus();
    });
  })();
  </script>
</body>
</html>
