<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DOOM</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="dist/js-dos.css">
  <script src="dist/js-dos.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#dos{width:100%;height:100%;overflow:hidden;background:#000}
    #tap{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
    #tap h1{font-family:'Courier New',monospace;font-size:2rem;color:#ff3e3e;text-shadow:0 0 20px #ff3e3e;letter-spacing:4px}
    #tap p{color:#888;font-size:0.9rem;margin-top:12px;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
    #tap.h{display:none}
  </style>
</head>
<body>
  <div id="tap">
    <h1>DOOM</h1>
    <p>Натисни щоб грати</p>
  </div>
  <div id="dos"></div>
  <script>
    try {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#000000');
        tg.setBackgroundColor('#000000');
        if (tg.BackButton) tg.BackButton.hide();
        if (tg.requestFullscreen) tg.requestFullscreen();
      }
    } catch(e) {}

    emulators.pathPrefix = "dist/";

    var ci = null;

    Dos(document.getElementById("dos"), {
      autoStart: true
    }).run("doom.jsdos").then(function(c) {
      ci = c;
    });

    document.getElementById('tap').addEventListener('click', function() {
      this.classList.add('h');
      var canvas = document.querySelector('#dos canvas');
      if (canvas) {
        canvas.focus();
        canvas.click();
      }
      if (ci && ci.fullscreen) {
        try { ci.fullscreen(); } catch(e) {}
      }
    });
  </script>
</body>
</html>
