<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DOOM</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000}
    #dos{width:100%;height:100%}
    #loader{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
    #loader h1{font-family:'Courier New',monospace;font-size:2.2rem;color:#ff3e3e;text-shadow:0 0 30px #ff3e3e;letter-spacing:6px}
    #loader p{font-family:'Segoe UI',sans-serif;color:#888;font-size:0.85rem;margin-top:12px}
    #loader .bar{width:220px;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;margin-top:20px;overflow:hidden}
    #loader .fill{height:100%;width:0%;background:linear-gradient(90deg,#ff3e3e,#ff6600);border-radius:3px;animation:load 5s ease-in-out forwards}
    @keyframes load{0%{width:0%}30%{width:40%}60%{width:70%}90%{width:90%}100%{width:100%}}
    #loader .sub{font-size:0.6rem;color:#444;margin-top:24px;font-family:monospace}
    #loader.done{display:none}
  </style>
</head>
<body>
  <div id="loader">
    <h1>DOOM</h1>
    <p>Завантаження WAD...</p>
    <div class="bar"><div class="fill"></div></div>
    <p class="sub">js-dos v8 | id Software 1993</p>
  </div>
  <div id="dos"></div>
  <script>
    (function(){
      try {
        var tg = window.Telegram && window.Telegram.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
      } catch(e) {}

      var loader = document.getElementById('loader');

      Dos(document.getElementById("dos"), {
        url: "doom.jsdos",
      }).then(function() {
        loader.classList.add('done');
      }).catch(function() {
        loader.querySelector('p').textContent = 'Помилка завантаження. Оновіть сторінку.';
      });
    })();
  </script>
</body>
</html>
