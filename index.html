<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DOOM</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="dist/js-dos.css">
  <script src="dist/js-dos.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#dos{width:100%;height:100%;overflow:hidden;background:#000}
  </style>
</head>
<body>
  <div id="dos"></div>
  <script>
    try { var tg = window.Telegram && window.Telegram.WebApp; if (tg) { tg.ready(); tg.expand(); } } catch(e) {}

    emulators.pathPrefix = "dist/";

    Dos(document.getElementById("dos")).run("doom.jsdos");
  </script>
</body>
</html>
